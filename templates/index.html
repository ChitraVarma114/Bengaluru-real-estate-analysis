<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <title>Bengaluru Real Estate Price Predictor</title>

    <style>
      .price-display { font-size: 2.5rem; font-weight: bold; color: #28a745; margin: 20px 0; }
      .sub-info { font-size: 1rem; color: #6c757d; margin-bottom: 15px; }
      .comparables-section { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 8px; text-align: left; }
      .comparable-item { padding: 8px; border-bottom: 1px solid #dee2e6; }
      .comparable-item:last-child { border-bottom: none; }
      .error-msg { color: #dc3545; font-size: 1rem; }
      .loading-msg { color: #007bff; font-size: 1.2rem; }
    </style>
  </head>
  <body class="bg-dark">
    <div class="container">
      <div class="row">
        <div class="card" style="width:100%; height:100%; margin-top:48px">
          <div class="card-header" style="text-align:center">
            <h1>Bengaluru Real Estate Price Predictor</h1>
            <p class="text-muted mb-0">ML-powered price estimates with comparable property insights</p>
          </div>
          <div class="card-body">
            <form method="post" accept-charset="utf-8">

              <div class="row">
                <div class="col-md-6 form-group" style="text-align:center">
                  <label><b>Select the location:</b></label>
                  <select class="selectpicker form-control" id="location" name="location" required="1">
                    {% for location in locations %}
                    <option value="{{location}}">{{location}}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="col-md-6 form-group" style="text-align:center">
                  <label><b>Enter BHK:</b></label>
                  <input type="number" min="1" max="20" class="form-control" id="bhk" name="bhk" placeholder="e.g. 3" required>
                </div>

                <div class="col-md-6 form-group" style="text-align:center">
                  <label><b>Enter number of bathrooms:</b></label>
                  <input type="number" min="1" max="20" class="form-control" id="bath" name="bath" placeholder="e.g. 2" required>
                </div>

                <div class="col-md-6 form-group" style="text-align:center">
                  <label><b>Enter square feet:</b></label>
                  <input type="number" min="100" step="any" class="form-control" id="total_sqft" name="total_sqft" placeholder="e.g. 1500" required>
                </div>

                <div class="col-md-12 form-group">
                  <button type="button" class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>
                </div>
              </div>
            </form>

            <div id="result-area" class="col-md-12" style="text-align:center">
              <!-- Result gets injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function send_data() {
        var resultArea = document.getElementById('result-area');
        resultArea.innerHTML = '<p class="loading-msg">Predicting price...</p>';

        var fd = new FormData(document.querySelector('form'));
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/predict', true);

        xhr.onreadystatechange = function() {
          if (xhr.readyState === XMLHttpRequest.DONE) {
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                renderResult(data);
              } catch (e) {
                resultArea.innerHTML = '<p class="error-msg">Could not parse response: ' + xhr.responseText + '</p>';
              }
            } else {
              resultArea.innerHTML = '<p class="error-msg">' + xhr.responseText + '</p>';
            }
          }
        };

        xhr.send(fd);
      }

      function renderResult(data) {
        var html = '';
        html += '<div class="price-display">' + data.predicted_price + '</div>';
        html += '<div class="sub-info">' + data.price_per_sqft + '</div>';

        if (data.comparables && data.comparables.length > 0) {
          html += '<div class="comparables-section">';
          html += '<h5>' + data.comparable_count + ' similar propert' + (data.comparable_count === 1 ? 'y' : 'ies') + ' in this area:</h5>';
          data.comparables.forEach(function(c) {
            html += '<div class="comparable-item">';
            html += '<strong>' + c.bhk + ' BHK, ' + c.sqft + ' sqft, ' + c.bath + ' bath</strong>';
            html += ' &mdash; actual listed price: <strong>' + c.actual_price + '</strong>';
            html += '</div>';
          });
          html += '</div>';
        } else {
          html += '<div class="comparables-section">';
          html += '<p class="text-muted mb-0">No directly comparable properties found in this exact location + BHK combination. Estimate is based on the broader model.</p>';
          html += '</div>';
        }

        document.getElementById('result-area').innerHTML = html;
      }
    </script>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
  </body>
</html>
